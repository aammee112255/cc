<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寒霜啟示錄-廣告極速版</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e6f2ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #game-container {
            width: 480px;
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            overflow: hidden;
            border: 4px solid #b3d7ff;
        }
        .header {
            background: #2b5c8f;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }
        .dashboard {
            display: flex;
            justify-content: space-around;
            background: #f0f7ff;
            padding: 10px;
            border-bottom: 2px solid #b3d7ff;
            font-weight: bold;
        }
        .house-panel {
            text-align: center;
            padding: 15px;
            background: #eef5fc;
        }
        #house-display {
            font-size: 40px;
            margin: 10px 0;
        }
        .upgrade-btn {
            background: #ff9800;
            color: white;
            border: none;
            padding: 8px 15px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .upgrade-btn:hover { background: #e68a00; }
        .upgrade-btn:disabled { background: #cccccc; cursor: not-allowed; }
        
        .action-zone {
            display: flex;
            justify-content: space-around;
            padding: 20px;
        }
        .action-card {
            width: 45%;
            text-align: center;
            padding: 15px;
            border: 2px solid #cedede;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.1s;
            user-select: none;
        }
        .action-card:active { transform: scale(0.95); }
        .wood-card { background: #e2f0d9; border-color: #a9d18e; }
        .bear-card { background: #fff2cc; border-color: #ffd966; }
        .card-icon { font-size: 45px; margin-bottom: 5px; }
        
        .market-zone {
            padding: 15px;
            background: #f9f9f9;
            border-top: 2px solid #eee;
        }
        .customer-queue {
            display: flex;
            align-items: center;
            background: white;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            min-height: 50px;
        }
        .customer {
            font-size: 30px;
            margin-right: 15px;
            position: relative;
        }
        .demand-bubble {
            background: #333;
            color: white;
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 12px;
            margin-left: 10px;
        }
        .sell-btn {
            margin-left: auto;
            background: #4caf50;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .sell-btn:hover { background: #45a049; }
        .sell-btn:disabled { background: #cccccc; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="header">❄️ 寒霜啟示錄 - 廣告模擬器 ❄️</div>
    
    <div class="dashboard">
        <div>💰 金幣: $<span id="money">0</span></div>
        <div>🪵 木材: <span id="wood">0</span></div>
        <div>🥩 熊肉: <span id="meat">0</span></div>
    </div>
    
    <div class="house-panel">
        <div id="house-level">當前住所：破爛小木屋 (Lv.1)</div>
        <div id="house-display">🏚️</div>
        <button id="upgrade-btn" class="upgrade-btn" onclick="upgradeHouse()">升級房子 (需要 $50)</button>
    </div>
    
    <div class="action-zone">
        <div class="action-card wood-card" onclick="gather('wood')">
            <div class="card-icon">🌲</div>
            <strong>砍伐木材</strong>
            <div style="font-size: 12px; color: #666; margin-top:5px;">點擊 +1 木材</div>
        </div>
        <div class="action-card bear-card" onclick="gather('meat')">
            <div class="card-icon">🐻‍❄️</div>
            <strong>狩獵北極熊</strong>
            <div style="font-size: 12px; color: #666; margin-top:5px;">點擊 +1 熊肉</div>
        </div>
    </div>
    
    <div class="market-zone">
        <div style="font-weight: bold; margin-bottom: 8px; color: #555;">排隊買物資的倖存者：</div>
        <div class="customer-queue">
            <div id="customer-icon" class="customer">🧍</div>
            <div id="demand-text" class="demand-bubble">我要 3 個木材</div>
            <button id="sell-btn" class="sell-btn" onclick="sellItems()">賣給他！</button>
        </div>
    </div>
</div>

<script>
    // 遊戲數據
    let gameState = {
        money: 0,
        wood: 0,
        meat: 0,
        houseLevel: 1,
        upgradeCost: 50
    };

    // 客人需求狀態
    let currentDemand = {
        type: 'wood', // wood 或 meat
        amount: 3,
        reward: 15
    };

    const houseStages = [
        { lvl: 1, name: "破爛小木屋", icon: "🏚️", cost: 50 },
        { lvl: 2, name: "溫馨磚瓦房", icon: "🏡", cost: 150 },
        { lvl: 3, name: "高級雙層別墅", icon: "🏠", cost: 400 },
        { lvl: 4, name: "豪華防寒城堡", icon: "🏰", cost: "已滿級" }
    ];

    const customerIcons = ["🧍", "🏃", "🧔", "👩", "👵", "🤠"];

    // 更新畫面
    function updateUI() {
        document.getElementById('money').innerText = gameState.money;
        document.getElementById('wood').innerText = gameState.wood;
        document.getElementById('meat').innerText = gameState.meat;
        
        // 更新房子
        let stage = houseStages[Math.min(gameState.houseLevel - 1, houseStages.length - 1)];
        document.getElementById('house-level').innerText = `當前住所：${stage.name} (Lv.${gameState.houseLevel})`;
        document.getElementById('house-display').innerText = stage.icon;
        
        // 更新升級按鈕
        let upgradeBtn = document.getElementById('upgrade-btn');
        if (gameState.houseLevel >= houseStages.length) {
            upgradeBtn.innerText = "已升級至最高規格！";
            upgradeBtn.disabled = true;
        } else {
            let nextStage = houseStages[gameState.houseLevel - 1];
            upgradeBtn.innerText = `升級房子 (需要 $${nextStage.cost})`;
            upgradeBtn.disabled = gameState.money < nextStage.cost;
        }

        // 更新交易按鈕狀態
        let sellBtn = document.getElementById('sell-btn');
        if (currentDemand.type === 'wood') {
            sellBtn.disabled = gameState.wood < currentDemand.amount;
        } else {
            sellBtn.disabled = gameState.meat < currentDemand.amount;
        }
    }

    // 收集資源 (砍樹或打熊)
    function gather(type) {
        if (type === 'wood') {
            gameState.wood += 1;
        } else if (type === 'meat') {
            gameState.meat += 1;
        }
        updateUI();
    }

    // 生成新客人需求
    function generateCustomer() {
        const types = ['wood', 'meat'];
        currentDemand.type = types[Math.floor(Math.random() * types.length)];
        currentDemand.amount = Math.floor(Math.random() * 5) + 2; // 2~6個
        
        let typeName = currentDemand.type === 'wood' ? '🪵 木材' : '🥩 熊肉';
        currentDemand.reward = currentDemand.amount * (currentDemand.type === 'wood' ? 5 : 8); // 熊肉比較貴
        
        document.getElementById('demand-text').innerText = `我要 ${currentDemand.amount} 個${typeName} (付 $${currentDemand.reward})`;
        document.getElementById('customer-icon').innerText = customerIcons[Math.floor(Math.random() * customerIcons.length)];
        
        updateUI();
    }

    // 賣出東西
    function sellItems() {
        if (currentDemand.type === 'wood' && gameState.wood >= currentDemand.amount) {
            gameState.wood -= currentDemand.amount;
            gameState.money += currentDemand.reward;
            generateCustomer();
        } else if (currentDemand.type === 'meat' && gameState.meat >= currentDemand.amount) {
            gameState.meat -= currentDemand.amount;
            gameState.money += currentDemand.reward;
            generateCustomer();
        }
    }

    // 升級房子
    function upgradeHouse() {
        let currentCost = houseStages[gameState.houseLevel - 1].cost;
        if (gameState.money >= currentCost && gameState.houseLevel < houseStages.length) {
            gameState.money -= currentCost;
            gameState.houseLevel += 1;
            alert("🎉 恭喜！房子升級了！");
            updateUI();
        }
    }

    // 初始化遊戲
    generateCustomer();
</script>

</body>
</html>
