
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>寒霜啟示錄 - 真正3D空間與鏡頭跟隨版</title>
<style>
body {
margin: 0;
padding: 0;
overflow: hidden;
background-color: #0f172a;
font-family: 'Segoe UI', Arial, sans-serif;
user-select: none;
}
#canvas-container {
width: 100vw;
height: 100vh;
display: block;
}
/* 廣告風格 2D UI 頂部面板 */
.ui-container {
position: absolute;
top: 20px;
left: 50%;
transform: translateX(-50%);
display: flex;
gap: 20px;
z-index: 100;
}
.ui-box {
background: rgba(15, 23, 42, 0.75);
backdrop-filter: blur(10px);
border: 2px solid rgba(255, 255, 255, 0.2);
border-radius: 20px;
padding: 8px 24px;
display: flex;
align-items: center;
color: white;
font-weight: bold;
font-size: 18px;
box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}
.icon-cash { width: 20px; height: 12px; background: #22c55e; border: 2px solid white; border-radius: 2px; margin-right: 8px; }
.icon-wood { width: 18px; height: 12px; background: #b45309; border-radius: 3px; margin-right: 8px; }

.instruction {
position: absolute;
bottom: 25px;
left: 50%;
transform: translateX(-50%);
background: rgba(15, 23, 42, 0.85);
color: #93c5fd;
padding: 10px 25px;
border-radius: 30px;
font-size: 14px;
text-align: center;
pointer-events: none;
box-shadow: 0 10px 30px rgba(0,0,0,0.5);
border: 1px solid #334155;
z-index: 100;
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<div class="ui-container">
<div class="ui-box"><div class="icon-cash"></div>美鈔: $<span id="val-money">0</span></div>
<div class="ui-box"><div class="icon-wood"></div>木材: <span id="val-wood">0 / 15</span></div>
</div>

<div class="instruction">長按鍵盤 <b>W A S D</b> 或方向鍵移動，空間與 3D 鏡頭會完全跟隨小人轉動！</div>
<div id="canvas-container"></div>

<script>
// --- 1. 建立真正 3D 場景與相機 ---
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color('#e2eeff'); // 廣告雪地淺藍底色
scene.fog = new THREE.FogExp2('#e2eeff', 0.015);

// 使用透視相機 (PerspectiveCamera) 產生真正的近大遠小立體空間感
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true; // 開啟實體陰影
container.appendChild(renderer.domElement);

// --- 2. 光影系統 (有陰影才有立體感) ---
const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(20, 40, 20);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
scene.add(dirLight);

// --- 3. 遊戲數據狀態 ---
let gameState = {
money: 0,
wood: 0,
maxWood: 15,
speed: 0.2,
pX: 0,
pZ: 5
};

// --- 4. 用 3D 幾何體現場建立物體 ---

// 建立 3D 大地
const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshLambertMaterial({ color: '#f0f6ff' }));
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// 建立 3D 廣告黃土中央道路
const road = new THREE.Mesh(new THREE.PlaneGeometry(200, 6), new THREE.MeshLambertMaterial({ color: '#e2955d' }));
road.rotation.x = -Math.PI / 2;
road.position.y = 0.01;
road.receiveShadow = true;
scene.add(road);

// 3D 幾何樹木生成器 (用圓錐和圓柱疊出立體樹)
let trees = [];
function create3DTree(x, z) {
const treeGroup = new THREE.Group();

// 樹幹 (圓柱體)
const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 1.5, 8), new THREE.MeshLambertMaterial({ color: '#78350f' }));
trunk.position.y = 0.75;
trunk.castShadow = true;
treeGroup.add(trunk);

// 三層樹葉 (圓錐體)
const colors = ['#7cb3f5', '#93c5fd', '#bfdbfe'];
for(let i = 0; i < 3; i++) {
const leaf = new THREE.Mesh(new THREE.ConeGeometry(1.8 - i*0.4, 2, 6), new THREE.MeshLambertMaterial({ color: colors[i] }));
leaf.position.y = 2 + i * 1.2;
leaf.castShadow = true;
treeGroup.add(leaf);
}

treeGroup.position.set(x, 0, z);
scene.add(treeGroup);
trees.push({ mesh: treeGroup, x: x, z: z });
}

// 在上排種植一整排 3D 立體樹
for(let i = -15; i <= 15; i += 5) {
create3DTree(i, -8 + (Math.random() * 2 - 1));
}

// 建立 3D 卸貨木桌 (位於道路下方)
const table = new THREE.Mesh(new THREE.BoxGeometry(4, 1, 2), new THREE.MeshLambertMaterial({ color: '#b45309' }));
table.position.set(-4, 0.5, 5);
table.castShadow = true;
table.receiveShadow = true;
scene.add(table);

// 建立 3D 升級格
const upgradePad = new THREE.Mesh(new THREE.BoxGeometry(2, 0.05, 2), new THREE.MeshLambertMaterial({ color: '#334155' }));
upgradePad.position.set(4, 0.02, 5);
scene.add(upgradePad);

// --- 5. 建立 3D 主角小人 (純幾何拼裝，無 Emoji) ---
const playerGroup = new THREE.Group();

// 身體 (藍色防寒大衣方塊)
const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1.4, 0.8), new THREE.MeshLambertMaterial({ color: '#0284c7' }));
body.position.y = 0.7;
body.castShadow = true;
playerGroup.add(body);

// 頭部與兜帽 (白色帽子 + 膚色臉部球體)
const hood = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 16), new THREE.MeshLambertMaterial({ color: '#ffffff' }));
hood.position.y = 1.6;
playerGroup.add(hood);
const face = new THREE.Mesh(new THREE.SphereGeometry(0.28, 8, 8), new THREE.MeshLambertMaterial({ color: '#fed7aa' }));
face.position.set(0, 1.6, 0.2);
playerGroup.add(face);

// 手持 3D 採集斧頭
const axeGroup = new THREE.Group();
const handle = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 1.2), new THREE.MeshLambertMaterial({ color: '#78350f' }));
handle.rotation.x = Math.PI / 2;
axeGroup.add(handle);
const blade = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.4, 0.4), new THREE.MeshLambertMaterial({ color: '#94a3b8' }));
blade.position.z = 0.5;
axeGroup.add(blade);
axeGroup.position.set(0.6, 0.8, 0.2);
playerGroup.add(axeGroup);

// 背包掛載點：用來存放跟隨玩家背部疊高的木頭
const backpack = new THREE.Group();
backpack.position.set(0, 0.5, -0.5);
playerGroup.add(backpack);

scene.add(playerGroup);

// --- 6. 掉落物與背包系統動態陣列 ---
let backpackLogs = [];
let sceneCashes = [];

// 監聽鍵盤
let keys = {};
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

let harvestTimer = 0;
let unloadTimer = 0;

// --- 7. 核心遊戲與 3D 空間移動循環 ---
function animate() {
requestAnimationFrame(animate);

// 玩家控制移動
let moved = false;
let mx = 0, mz = 0;
if (keys['w'] || keys['arrowup']) { mz -= 1; moved = true; }
if (keys['s'] || keys['arrowdown']) { mz += 1; moved = true; }
if (keys['a'] || keys['arrowleft']) { mx -= 1; moved = true; }
if (keys['d'] || keys['arrowright']) { mx += 1; moved = true; }

if (moved) {
let length = Math.sqrt(mx*mx + mz*mz);
gameState.pX += (mx / length) * gameState.speed;
gameState.pZ += (mz / length) * gameState.speed;
playerGroup.position.set(gameState.pX, 0, gameState.pZ);

// 讓 3D 小人轉向移動方向
playerGroup.rotation.y = Math.atan2(mx, mz);
// 走路時身體微微搖擺
body.rotation.z = Math.sin(Date.now() * 0.01) * 0.1;
}

// 核心焦點：讓 3D 空間相機永遠緊緊跟隨主角移動
camera.position.set(playerGroup.position.x, playerGroup.position.y + 12, playerGroup.position.z + 12);
camera.lookAt(playerGroup.position.x, playerGroup.position.y + 0.5, playerGroup.position.z);

// 砍樹檢測
let nearTree = false;
trees.forEach(tree => {
let dist = Math.sqrt(Math.pow(playerGroup.position.x - tree.x, 2) + Math.pow(playerGroup.position.z - tree.z, 2));
if(dist < 2) {
nearTree = true;
// 斧頭揮動動畫
axeGroup.rotation.x = Math.sin(Date.now() * 0.02) * 0.8;

if (Date.now() - harvestTimer > 250) {
if (gameState.wood < gameState.maxWood) {
gameState.wood++;
updateBackpack3D();
}
harvestTimer = Date.now();
}
}
});
if(!nearTree) axeGroup.rotation.x = 0;

// 走到木桌旁 (-4, 5) 卸貨
let distToTable = Math.sqrt(Math.pow(playerGroup.position.x - (-4), 2) + Math.pow(playerGroup.position.z - 5, 2));
if(distToTable < 2 && gameState.wood > 0) {
if (Date.now() - unloadTimer > 150) {
gameState.wood--;
updateBackpack3D();

// 桌上生成卸下的 3D 木頭
const tLog = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.8, 8), new THREE.MeshLambertMaterial({ color: '#d97706' }));
tLog.rotation.z = Math.PI / 2;
tLog.position.set(-4 + (Math.random()*1 - 0.5), 1.1, 5 + (Math.random()*0.6 - 0.3));
scene.add(tLog);
setTimeout(() => scene.remove(tLog), 2000); // 兩秒後自動清理

// 物理噴發立體 3D 美鈔方塊
spawn3DCash();
unloadTimer = Date.now();
}
}

// 處理地面 3D 鈔票物理動態與吸取
for (let i = sceneCashes.length - 1; i >= 0; i--) {
let cash = sceneCashes[i];
if (cash.ticks > 0) {
// 模擬剛噴出來時的拋物線跳躍
cash.mesh.position.x += cash.vx;
cash.mesh.position.y += cash.vy;
cash.mesh.position.z += cash.vz;
cash.vy -= 0.015; // 重力加速度
if (cash.mesh.position.y < 0.1) { cash.mesh.position.y = 0.1; cash.ticks = 0; }
cash.ticks--;
} else {
// 落地後檢測吸附
let distToCash = Math.sqrt(Math.pow(playerGroup.position.x - cash.mesh.position.x, 2) + Math.pow(playerGroup.position.z - cash.mesh.position.z, 2));
if (distToCash < 1.5) {
gameState.money += 10;
document.getElementById('val-money').innerText = gameState.money;
scene.remove(cash.mesh);
sceneCashes.splice(i, 1);
}
}
}

renderer.render(scene, camera);
}

// 核心算法：在背上將 3D 圓柱體木頭實時往上疊高
function updateBackpack3D() {
backpackLogs.forEach(log => backpack.remove(log));
backpackLogs = [];

for (let i = 0; i < gameState.wood; i++) {
const logMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.9, 8), new THREE.MeshLambertMaterial({ color: '#d97706' }));
logMesh.rotation.z = Math.PI / 2; // 橫放
logMesh.position.y = i * 0.18; // 依據數量一層層往上加高
logMesh.castShadow = true;
backpack.add(logMesh);
backpackLogs.push(logMesh);
}
document.getElementById('val-wood').innerText = `${gameState.wood} / ${gameState.maxWood}`;
}

// 核心算法：噴發真正的 3D 方塊美鈔
function spawn3DCash() {
const cashMesh = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.1, 0.3), new THREE.MeshLambertMaterial({ color: '#4ade80' }));
cashMesh.position.set(-4, 1, 5);
scene.add(cashMesh);

sceneCashes.push({
mesh: cashMesh,
vx: (Math.random() * 0.12 - 0.04),
vy: (Math.random() * 0.15 + 0.1),
vz: (Math.random() * 0.12 + 0.02),
ticks: 35
});
}

// 視窗自適應縮放
window.addEventListener('resize', () => {
camera.aspect = window.innerWidth / window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth, window.innerHeight);
});

// 啟動 3D 世界
animate();
</script>
</body>
</html>
