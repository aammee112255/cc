
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>寒霜啟示錄 - 10層極致奢華進化版</title>
<style>
body {
margin: 0; padding: 0; overflow: hidden;
background-color: #0f172a; font-family: 'Segoe UI', Arial, sans-serif; user-select: none;
}
#canvas-container { width: 100vw; height: 100vh; display: block; }
.ui-container {
position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
display: flex; gap: 15px; z-index: 100;
}
.ui-box {
background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(10px);
border: 2px solid rgba(255, 255, 255, 0.2); border-radius: 20px;
padding: 8px 22px; display: flex; align-items: center;
color: white; font-weight: bold; font-size: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}
.icon-cash { width: 18px; height: 11px; background: #22c55e; border: 2px solid white; border-radius: 2px; margin-right: 6px; }
.icon-wood { width: 16px; height: 11px; background: #b45309; border-radius: 3px; margin-right: 6px; }
.icon-meat { width: 16px; height: 11px; background: #ef4444; border-radius: 50%; margin-right: 6px; }

.instruction {
position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
background: rgba(15, 23, 42, 0.9); color: #93c5fd; padding: 12px 30px;
border-radius: 30px; font-size: 13px; text-align: center; pointer-events: none;
box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #334155; z-index: 100; line-height: 1.6;
width: 85%; max-width: 950px;
}
#damage-flash {
position: absolute; top:0; left:0; width:100vw; height:100vh;
background: rgba(239, 68, 68, 0.3); pointer-events: none; display: none; z-index: 99;
}
</style>
<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
</head>
<body>

<div id="damage-flash"></div>

<div class="ui-container">
<div class="ui-box"><div class="icon-cash"></div>$<span id="val-money">0</span></div>
<div class="ui-box"><div class="icon-wood"></div>木材: <span id="val-wood">0/30</span></div>
<div class="ui-box"><div class="icon-meat"></div>肉: <span id="val-meat">0/15</span></div>
</div>

<div class="instruction">
🎮 <b>WASD / 方向鍵</b> 移動 | 🪓 靠近北極熊時<b>按下「空白鍵 (Space)」</b>揮斧攻擊獲得肉！<br>
🌲 靠近樹木會<b>自動Q彈砍伐</b>並收集木頭 | 🏠 站在藍色虛線地基上消耗木頭，解鎖 <b>1 ~ 10 級極致特效進化</b>！<br>
🎒 靠近左側 500 元可升級背包上限，排隊的客人會帶來大量美鈔喔！
</div>

<div id="canvas-container"></div>

<script>
// --- 1. 音效系統 ---
const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); }

function playBuildSound() {
initAudio(); if (!audioCtx) return;
let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine';
osc.frequency.setValueAtTime(300, audioCtx.currentTime);
osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.08);
gain.gain.setValueAtTime(0.15, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.08);
osc.start(); osc.stop(audioCtx.currentTime + 0.08);
}

function playCoinSound() {
initAudio(); if (!audioCtx) return;
let now = audioCtx.currentTime;
let osc1 = audioCtx.createOscillator(); let gain1 = audioCtx.createGain();
osc1.connect(gain1); gain1.connect(audioCtx.destination); osc1.type = 'triangle'; osc1.frequency.setValueAtTime(987.77, now);
gain1.gain.setValueAtTime(0.1, now); gain1.gain.linearRampToValueAtTime(0, now + 0.1);
osc1.start(now); osc1.stop(now + 0.1);

let osc2 = audioCtx.createOscillator(); let gain2 = audioCtx.createGain();
osc2.connect(gain2); gain2.connect(audioCtx.destination); osc2.type = 'triangle'; osc2.frequency.setValueAtTime(1318.51, now + 0.06);
gain2.gain.setValueAtTime(0.1, now + 0.06); gain2.gain.linearRampToValueAtTime(0, now + 0.25);
osc2.start(now + 0.06); osc2.stop(now + 0.25);
}

window.addEventListener('click', () => { initAudio(); });

// --- 2. 初始化 3D 場景 ---
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color('#1e293b');
scene.fog = new THREE.FogExp2('#1e293b', 0.015);

const camera = new THREE.PerspectiveCamera(36, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

const ambientLight = new THREE.AmbientLight(0xffffff, 0.75); scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xfff3e0, 1.3);
dirLight.position.set(20, 60, 40); dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048; dirLight.shadow.mapSize.height = 2048;
const d = 60; dirLight.shadow.camera.left = -d; dirLight.shadow.camera.right = d;
dirLight.shadow.camera.top = d; dirLight.shadow.camera.bottom = -d;
dirLight.shadow.bias = -0.0005;
scene.add(dirLight);

// --- 3. 遊戲核心狀態 ---
let gameState = { money: 0, wood: 0, maxWood: 30, meat: 0, maxMeat: 15, speed: 0.28, pX: 0, pZ: 20 };

let housesData = [
{ id: 0, x: -14, z: 22, level: 0, cost: 5 },
{ id: 1, x: -4, z: 22, level: 0, cost: 8 },
{ id: 2, x: 6, z: 22, level: 0, cost: 10 }
];

const snowMat = new THREE.MeshStandardMaterial({ color: '#cbd5e1', roughness: 0.9 });
const roadMat = new THREE.MeshStandardMaterial({ color: '#334155', roughness: 0.8 });
const logMat = new THREE.MeshStandardMaterial({ color: '#d97706', roughness: 0.6 });
const meatMat = new THREE.MeshStandardMaterial({ color: '#f87171', roughness: 0.5 });
const cashMat = new THREE.MeshStandardMaterial({ color: '#4ade80', roughness: 0.4 });

const floor = new THREE.Mesh(new THREE.BoxGeometry(400, 2, 400), snowMat); floor.position.y = -1; floor.receiveShadow = true; scene.add(floor);
const road = new THREE.Mesh(new THREE.PlaneGeometry(400, 8), roadMat); road.rotation.x = -Math.PI / 2; road.position.set(0, 0.02, 6); road.receiveShadow = true; scene.add(road);

// --- 4. 粒子特效系統 ---
let particlesData = [];
function createParticles(x, y, z, count, colors) {
for (let i = 0; i < count; i++) {
const pSize = 0.12 + Math.random() * 0.12;
const pMat = new THREE.MeshBasicMaterial({ color: colors[Math.floor(Math.random() * colors.length)] });
const pMesh = new THREE.Mesh(new THREE.BoxGeometry(pSize, pSize, pSize), pMat);
pMesh.position.set(x, y, z); scene.add(pMesh);
particlesData.push({
mesh: pMesh,
vx: (Math.random() - 0.5) * 0.25, vy: 0.15 + Math.random() * 0.25, vz: (Math.random() - 0.5) * 0.25,
life: 1.0, decay: 0.03 + Math.random() * 0.03
});
}
}
function updateParticles() {
for (let i = particlesData.length - 1; i >= 0; i--) {
let p = particlesData[i]; p.mesh.position.x += p.vx; p.mesh.position.y += p.vy; p.mesh.position.z += p.vz;
p.vy -= 0.01; p.life -= p.decay; p.mesh.scale.set(p.life, p.life, p.life);
if (p.life <= 0) { scene.remove(p.mesh); particlesData.splice(i, 1); }
}
}

// --- 5. 樹林系統 ---
let trees = [];
const vividTreeColors = ['#0f766e', '#0d9488', '#14b8a6'];

function spawnNewTree(index, isInit = false) {
let rx, rz;
while(true) {
rx = (Math.random() - 0.5) * 180;
rz = (Math.random() - 0.5) * 180;
if (rz >= -5 && rz <= 35 && rx > -40 && rx < 30) continue;
break;
}

const treeGroup = new THREE.Group();
const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.25, 1.2, 8), new THREE.MeshStandardMaterial({ color: '#451a03' }));
trunk.position.y = 0.6; trunk.castShadow = true; treeGroup.add(trunk);

for(let j = 0; j < 3; j++) {
const leaf = new THREE.Mesh(new THREE.ConeGeometry(1.6 - j*0.3, 1.8, 6), new THREE.MeshStandardMaterial({ color: vividTreeColors[j], roughness: 0.6 }));
leaf.position.y = 1.5 + j * 0.9; leaf.castShadow = true; treeGroup.add(leaf);
}

treeGroup.position.set(rx, isInit ? 0 : -5, rz);
scene.add(treeGroup);
if (!isInit) createParticles(rx, 0.5, rz, 15, ['#22c55e', '#ffffff']);

let treeObj = { mesh: treeGroup, x: rx, z: rz, bounceTime: 0, woodLeft: 20 };
if (isInit) trees.push(treeObj); else trees[index] = treeObj;
}

for(let i = 0; i < 120; i++) spawnNewTree(i, true);

// --- 6. 房屋地基與 1 ~ 10 層華麗升級外觀 ---
let houseGroups = {};
housesData.forEach(h => {
const pad = new THREE.Mesh(new THREE.BoxGeometry(4.5, 0.05, 4.5), new THREE.MeshBasicMaterial({ color: '#38bdf8', wireframe: true }));
pad.position.set(h.x, 0.03, h.z); scene.add(pad);
const hGroup = new THREE.Group(); hGroup.position.set(h.x, 0, h.z); scene.add(hGroup);
houseGroups[h.id] = hGroup;
});

function addHouseDecorations(group, width, height, colorObj = { window: '#fef08a', door: '#7c2d12' }) {
const winMat = new THREE.MeshStandardMaterial({ color: colorObj.window, emissive: colorObj.window, emissiveIntensity: 0.5 });
const doorMat = new THREE.MeshStandardMaterial({ color: colorObj.door, roughness: 0.6 });
const winL = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.1), winMat); winL.position.set(-width*0.25, height*0.5, width*0.502);
const winR = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.1), winMat); winR.position.set(width*0.25, height*0.5, width*0.502);
const door = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.9, 0.1), doorMat); door.position.set(0, 0.45, width*0.502);
group.add(winL, winR, door);
}

// 全域動畫動態綁定清單
let lvl2CubesList = [];
let lvl3CrystalList = [];
let lvl4AuraPillarsList = [];
let lvl5DiamondAuraList = [];
let lvl6HolyRelicList = [];
let lvl7GearMechList = [];
let lvl8AetherRingsList = [];
let lvl9GalaxyList = [];
let lvl10FloatingList = [];

function rebuildHouse3D(hId) {
const hGroup = houseGroups[hId];
const data = housesData.find(x => x.id === hId);

// 每次升級徹底清理舊機器的動畫記錄
lvl2CubesList = lvl2CubesList.filter(item => item.id !== hId);
lvl3CrystalList = lvl3CrystalList.filter(item => item.id !== hId);
lvl4AuraPillarsList = lvl4AuraPillarsList.filter(item => item.id !== hId);
lvl5DiamondAuraList = lvl5DiamondAuraList.filter(item => item.id !== hId);
lvl6HolyRelicList = lvl6HolyRelicList.filter(item => item.id !== hId);
lvl7GearMechList = lvl7GearMechList.filter(item => item.id !== hId);
lvl8AetherRingsList = lvl8AetherRingsList.filter(item => item.id !== hId);
lvl9GalaxyList = lvl9GalaxyList.filter(item => item.id !== hId);
lvl10FloatingList = lvl10FloatingList.filter(item => item.id !== hId);

while(hGroup.children.length > 0) { hGroup.remove(hGroup.children[0]); }
let lvl = data.level; if (lvl === 0) return;

function enableShadow(mesh) { mesh.castShadow = true; mesh.receiveShadow = true; return mesh; }

// --- 核心組裝各層房屋 ---
if (lvl === 1) {
// 第 1 級：小木屋 (保留原紅屋頂)
const base = enableShadow(new THREE.Mesh(new THREE.BoxGeometry(3.0, 1.8, 3.0), new THREE.MeshStandardMaterial({ color: '#dc2626', roughness: 0.5 }))); base.position.y = 0.9;
const roof = enableShadow(new THREE.Mesh(new THREE.ConeGeometry(2.4, 1.5, 4), new THREE.MeshStandardMaterial({ color: '#ea580c' }))); roof.position.y = 2.55; roof.rotation.y = Math.PI / 4;
hGroup.add(base, roof); addHouseDecorations(hGroup, 3.0, 1.8);
}
else if (lvl === 2) {
// 第 2 級：方格屋 + 旋轉Q彈方塊
const base = enableShadow(new THREE.Mesh(new THREE.BoxGeometry(3.2, 2.0, 3.2), new THREE.MeshStandardMaterial({ color: '#b91c1c', roughness: 0.4 }))); base.position.y = 1.0;
const roofPlate = enableShadow(new THREE.Mesh(new THREE.BoxGeometry(3.4, 0.2, 3.4), new THREE.MeshStandardMaterial({ color: '#f59e0b' }))); roofPlate.position.y = 2.1;
hGroup.add(base, roofPlate);
const animCube = enableShadow(new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), new THREE.MeshStandardMaterial({ color: '#ef4444', metalness: 0.5 })));
animCube.position.set(0, 2.7, 0); hGroup.add(animCube);
lvl2CubesList.push({ id: hId, mesh: animCube });
addHouseDecorations(hGroup, 3.2, 2.0);
}
else if (lvl === 3) {
// 第 3 級：冰晶城堡 + 自轉漂浮冰晶
const castleBase = enableShadow(new THREE.Mesh(new THREE.BoxGeometry(3.5, 1.4, 3.5), new THREE.MeshStandardMaterial({ color: '#1e3a8a', roughness: 0.3, metalness: 0.4 }))); castleBase.position.y = 0.7;
const marbleSecond = enableShadow(new THREE.Mesh(new THREE.BoxGeometry(2.9, 1.2, 2.9), new THREE.MeshStandardMaterial({ color: '#f8fafc', roughness: 0.1 }))); marbleSecond.position.y = 2.0;
const goldenRoof = enableShadow(new THREE.Mesh(new THREE.ConeGeometry(2.2, 1.5, 4), new THREE.MeshStandardMaterial({ color: '#fbbf24', metalness: 0.8 }))); goldenRoof.position.y = 3.35; goldenRoof.rotation.y = Math.PI / 4;
hGroup.add(castleBase, marbleSecond, goldenRoof);
const crystalMesh = new THREE.Mesh(new THREE.OctahedronGeometry(0.38, 0), new THREE.MeshStandardMaterial({ color: '#10b981', emissive: '#34d399', emissiveIntensity: 0.8, metalness: 0.9 }));
crystalMesh.position.y = 4.6; hGroup.add(crystalMesh);
lvl3CrystalList.push({ id: hId, mesh: crystalMesh });
addHouseDecorations(hGroup, 3.5, 1.4, { window: '#67e8f9', door: '#f59e0b' });
}
else if (lvl === 4) {
// 第 4 級：極光神殿 + 四根霓虹極光變色能量柱
const templeBase = enableShadow(new THREE.Mesh(new THREE.BoxGeometry(3.6, 1.6, 3.6), new THREE.MeshStandardMaterial({ color: '#4c1d95', metalness: 0.4 }))); templeBase.position.y = 0.8;
const templeRoof = enableShadow(new THREE.Mesh(new THREE.BoxGeometry(3.8, 0.3, 3.8), new THREE.MeshStandardMaterial({ color: '#1e1b4b', metalness: 0.6 }))); templeRoof.position.y = 2.5;
const topSpire = enableShadow(new THREE.Mesh(new THREE.ConeGeometry(1.4, 1.8, 8), new THREE.MeshStandardMaterial({ color: '#8b5cf6', emissive: '#a78bfa', emissiveIntensity: 0.3 }))); topSpire.position.y = 3.55;
hGroup.add(templeBase, templeRoof, topSpire);
const pillarGeo = new THREE.CylinderGeometry(0.1, 0.1, 1.5, 8);
const positions = [ [-1.6, 1.6], [1.6, 1.6], [-1.6, -1.6], [1.6, -1.6] ];
let localPillars = [];
positions.forEach(pos => {
const pillar = new THREE.Mesh(pillarGeo, new THREE.MeshStandardMaterial({ color: '#06b6d4', emissive: '#22d3ee', emissiveIntensity: 0.9, transparent: true, opacity: 0.85 }));
pillar.position.set(pos[0], 1.5, pos[1]); hGroup.add(pillar); localPillars.push(pillar);
});
lvl4AuraPillarsList.push({ id: hId, meshes: localPillars });
addHouseDecorations(hGroup, 3.6, 1.6, { window: '#f472b6', door: '#8b5cf6' });
}
else if (lvl === 5) {
// 第 5 級：大理石宮殿 + 浮空鑽石呼吸光陣
const base = enableShadow(new THREE.Mesh(new THREE.BoxGeometry(3.6, 1.8, 3.6), new THREE.MeshStandardMaterial({ color: '#f8fafc', roughness: 0.1 }))); base.position.y = 0.9;
const roof = enableShadow(new THREE.Mesh(new THREE.ConeGeometry(2.4, 1.4, 4), new THREE.MeshStandardMaterial({ color: '#0284c7' }))); roof.position.y = 2.5; roof.rotation.y = Math.PI/4;
hGroup.add(base, roof);
const diamondGroup = new THREE.Group(); diamondGroup.position.y = 3.6;
for(let i=0; i<4; i++) {
const dim = new THREE.Mesh(new THREE.OctahedronGeometry(0.2, 0), new THREE.MeshStandardMaterial({ color: '#eab308', emissive: '#facc15', emissiveIntensity: 0.9 }));
dim.position.set(Math.cos(i*Math.PI/2)*0.8, 0, Math.sin(i*Math.PI/2)*0.8); diamondGroup.add(dim);
}
hGroup.add(diamondGroup); lvl5DiamondAuraList.push({ id: hId, group: diamondGroup });
addHouseDecorations(hGroup, 3.6, 1.8, { window: '#38bdf8', door: '#0f172a' });
}
else if (lvl === 6) {
// 第 6 級：黃金大教堂 + 頂端自轉純金十字聖物
const base = enableShadow(new THREE.Mesh(new THREE.BoxGeometry(3.6, 2.2, 3.6), new THREE.MeshStandardMaterial({ color: '#7c2d12', roughness: 0.4 }))); base.position.y = 1.1;
const dome = enableShadow(new THREE.Mesh(new THREE.SphereGeometry(1.4, 16, 16, 0, Math.PI*2, 0, Math.PI/2), new THREE.MeshStandardMaterial({ color: '#fbbf24', metalness: 0.8 }))); dome.position.y = 2.2;
hGroup.add(base, dome);
const relic = new THREE.Group(); relic.position.y = 4.0;
const hBar = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.16, 0.16), new THREE.MeshStandardMaterial({ color: '#fbbf24', metalness: 0.9, emissive: '#eab308', emissiveIntensity: 0.4 }));
const vBar = new THREE.Mesh(new THREE.BoxGeometry(0.16, 1.2, 0.16), new THREE.MeshStandardMaterial({ color: '#fbbf24', metalness: 0.9, emissive: '#eab308', emissiveIntensity: 0.4 }));
hBar.position.y = 0.2; relic.add(hBar, vBar); hGroup.add(relic);
lvl6HolyRelicList.push({ id: hId, group: relic });
addHouseDecorations(hGroup, 3.6, 2.2, { window: '#fef08a', door: '#f97316' });
}
else if (lvl === 7) {
// 第 7 級：機械要塞 + 交替伸縮齒輪與機械臂
const base = enableShadow(new THREE.Mesh(new THREE.BoxGeometry(3.8, 2.0, 3.8), new THREE.MeshStandardMaterial({ color: '#475569', metalness: 0.7, roughness: 0.3 }))); base.position.y = 1.0;
hGroup.add(base);
const mechGroup = new THREE.Group(); mechGroup.position.y = 2.1;
const gear = new THREE.Mesh(new THREE.CylinderGeometry(1.0, 1.0, 0.2, 12), new THREE.MeshStandardMaterial({ color: '#94a3b8', metalness: 0.9 })); gear.rotation.x = Math.PI/2;
const arm = new THREE.Mesh(new THREE.BoxGeometry(0.2, 1.2, 0.2), new THREE.MeshStandardMaterial({ color: '#3b82f6', metalness: 0.6 })); arm.position.y = 0.6;
mechGroup.add(gear, arm); hGroup.add(mechGroup);
lvl7GearMechList.push({ id: hId, gear: gear, arm: arm });
addHouseDecorations(hGroup, 3.8, 2.0, { window: '#ef4444', door: '#1e293b' });
}
else if (lvl === 8) {
// 第 8 級：懸浮天空城 + 基座螺旋浮空能量環
const castle = enableShadow(new THREE.Mesh(new THREE.BoxGeometry(3.4, 2.2, 3.4), new THREE.MeshStandardMaterial({ color: '#e2e8f0', roughness: 0.2 }))); castle.position.y = 1.5;
hGroup.add(castle);
const ring1 = new THREE.Mesh(new THREE.TorusGeometry(2.0, 0.08, 8, 32), new THREE.MeshStandardMaterial({ color: '#3b82f6', emissive: '#60a5fa', emissiveIntensity: 0.8 }));
const ring2 = new THREE.Mesh(new THREE.TorusGeometry(1.6, 0.08, 8, 32), new THREE.MeshStandardMaterial({ color: '#06b6d4', emissive: '#22d3ee', emissiveIntensity: 0.8 }));
ring1.position.y = 0.3; ring1.rotation.x = Math.PI/2; ring2.position.y = 0.6; ring2.rotation.x = Math.PI/2;
hGroup.add(ring1, ring2);
lvl8AetherRingsList.push({ id: hId, r1: ring1, r2: ring2 });
addHouseDecorations(hGroup, 3.4, 2.2, { window: '#60a5fa', door: '#3b82f6' });
}
else if (lvl === 9) {
// 第 9 級：星際聖殿 + 自轉微型星系模型
const body = enableShadow(new THREE.Mesh(new THREE.BoxGeometry(3.8, 2.4, 3.8), new THREE.MeshStandardMaterial({ color: '#1e1b4b', metalness: 0.5 }))); body.position.y = 1.2;
hGroup.add(body);
const galaxyGroup = new THREE.Group(); galaxyGroup.position.y = 4.0;
const sun = new THREE.Mesh(new THREE.SphereGeometry(0.35, 12, 12), new THREE.MeshStandardMaterial({ color: '#f97316', emissive: '#f97316', emissiveIntensity: 1.2 }));
galaxyGroup.add(sun);
let planets = [];
for(let i=0; i<2; i++) {
const p = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 8), new THREE.MeshStandardMaterial({ color: i===0?'#3b82f6':'#a855f7' }));
galaxyGroup.add(p); planets.push(p);
}
hGroup.add(galaxyGroup);
lvl9GalaxyList.push({ id: hId, group: galaxyGroup, planets: planets });
addHouseDecorations(hGroup, 3.8, 2.4, { window: '#a855f7', door: '#f97316' });
}
else if (lvl === 10) {
// 第 10 級：至尊浮空要塞 (完美全終極特效全開版)
const mainGroup = new THREE.Group();
const base = enableShadow(new THREE.Mesh(new THREE.BoxGeometry(4.2, 3.0, 4.2), new THREE.MeshStandardMaterial({ color: '#0f172a', metalness: 0.8, roughness: 0.1 }))); base.position.y = 1.5;

if (Date.now() - actionTimer > 400) {
gameState.meat--; document.getElementById('val-meat').innerText = `${gameState.meat}/${gameState.maxMeat}`;
playCoinSound(); createParticles(cust.x, 1.5, cust.z, 18, ['#22c55e', '#4ade80', '#eab308']);
for(let k=0; k<3; k++) {
const cMesh = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.08, 0.25), cashMat);
cMesh.castShadow = true; cMesh.position.set(cust.x + (Math.random()-0.5)*2, 0.1, cust.z + (Math.random()-0.5)*2);
scene.add(cMesh); sceneCashes.push({ mesh: cMesh });
}
scene.remove(cust.data.group); customers.shift();
customers.forEach((c, idx) => { c.index = idx; c.tx = counterX + 2.5 + (idx * 2.2); });
spawnCustomer(customers.length); actionTimer = Date.now();
}
}
}
}
});

// 玩家自動吸附美鈔
for (let i = sceneCashes.length - 1; i >= 0; i--) {
let cash = sceneCashes[i];
let dist = Math.sqrt(Math.pow(playerGroup.position.x - cash.mesh.position.x, 2) + Math.pow(playerGroup.position.z - cash.mesh.position.z, 2));
if (dist < 1.8) {
gameState.money += 100; document.getElementById('val-money').innerText = gameState.money;
scene.remove(cash.mesh); sceneCashes.splice(i, 1);
}
}

renderer.render(scene, camera);
}

function updateBackpack3D() {
while(backpack.children.length > 0) { backpack.remove(backpack.children[0]); }
for (let i = 0; i < gameState.wood; i++) {
const logMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.8, 6), logMat);
logMesh.castShadow = true; logMesh.rotation.z = Math.PI / 2; logMesh.position.y = i * 0.14; backpack.add(logMesh);
}
document.getElementById('val-wood').innerText = `${gameState.wood}/${gameState.maxWood}`;
}

window.addEventListener('resize', () => {
camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
